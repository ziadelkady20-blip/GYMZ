<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GYMZ Admin Panel</title>
<link rel="icon" href="assets/gymz-logo.png" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #000; --surface: #111; --surface2: #1a1a1a;
  --red: #E10600; --white: #fff; --gray: #A1A1A1;
  --border: rgba(255,255,255,0.08);
  --green: #22c55e; --yellow: #f59e0b;
}
body { background: var(--bg); color: var(--white); font-family: 'Inter', system-ui, sans-serif; min-height: 100svh; padding: 24px 16px; }

/* ── LAYOUT ── */
.wrap { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo img { width: 44px; height: 44px; object-fit: contain; }
.logo-text { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 20px; letter-spacing: 2px; }
.logo-text span { display: block; font-size: 10px; color: var(--gray); letter-spacing: 3px; font-weight: 600; }

/* ── CARD ── */
.card { background: var(--surface); border: 1px solid var(--border); padding: 28px 24px; display: flex; flex-direction: column; gap: 16px; }

/* ── TABS ── */
.tabs { display: flex; border-bottom: 1px solid var(--border); gap: 0; }
.tab-btn {
  flex: 1; padding: 12px; background: transparent; border: none; color: var(--gray);
  font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.2s; margin-bottom: -1px;
}
.tab-btn.active { color: var(--red); border-bottom-color: var(--red); }
.tab-panel { display: none; flex-direction: column; gap: 16px; }
.tab-panel.active { display: flex; }

/* ── FORM ELEMENTS ── */
label { font-size: 11px; color: var(--gray); letter-spacing: 1px; text-transform: uppercase; font-family: 'Montserrat', sans-serif; font-weight: 600; display: block; margin-bottom: 6px; }
input[type="text"], input[type="number"], textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--white); padding: 12px 14px; font-size: 14px; font-family: 'Inter', sans-serif;
  outline: none; transition: border-color 0.3s; resize: vertical;
}
input:focus, textarea:focus { border-color: var(--red); }
textarea { min-height: 80px; }
.field { display: flex; flex-direction: column; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.section-title-sm { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); border-bottom: 1px solid var(--border); padding-bottom: 10px; }

/* ── BUTTONS ── */
.btn-primary { background: var(--red); color: #fff; border: none; padding: 14px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: opacity 0.3s; width: 100%; }
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--gray); padding: 10px 16px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.btn-secondary:hover { border-color: var(--red); color: var(--red); }
.btn-danger { background: transparent; border: 1px solid rgba(225,6,0,0.3); color: var(--red); padding: 8px 14px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
.btn-danger:hover { background: rgba(225,6,0,0.1); }
.btn-row { display: flex; gap: 10px; }

/* ── FEEDBACK ── */
.feedback { font-size: 13px; padding: 10px 14px; border: 1px solid; display: none; }
.feedback.success { color: var(--green); border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.07); }
.feedback.error   { color: var(--red);   border-color: rgba(225,6,0,0.3);   background: rgba(225,6,0,0.07); }

/* ── LOGIN ── */
#loginScreen { display: flex; flex-direction: column; gap: 16px; }
#appScreen { display: none; flex-direction: column; gap: 20px; }
.error-msg { color: var(--red); font-size: 13px; display: none; }
input[type="password"] { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--white); padding: 14px; font-size: 15px; outline: none; font-family: inherit; transition: border-color 0.3s; }
input[type="password"]:focus { border-color: var(--red); }

/* ── STATUS SECTION ── */
.status-current { background: var(--bg); border: 1px solid var(--border); padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; animation: pulse 2s infinite; }
.status-dot.quiet    { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.5); }
.status-dot.moderate { background: var(--yellow); box-shadow: 0 0 8px rgba(245,158,11,0.5); }
.status-dot.busy     { background: var(--red);   box-shadow: 0 0 8px rgba(225,6,0,0.5); }
.status-dot.loading  { background: var(--gray); animation: none; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
.current-label { font-size: 12px; color: var(--gray); }
.current-value { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 14px; text-transform: uppercase; }
.status-btns { display: flex; flex-direction: column; gap: 8px; }
.status-btn { padding: 16px; border: 1px solid var(--border); background: var(--bg); color: var(--white); font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; }
.status-btn:hover { transform: translateX(4px); }
.status-btn.quiet    { border-color: var(--green); }
.status-btn.moderate { border-color: var(--yellow); }
.status-btn.busy     { border-color: var(--red); }
.status-btn.active-btn { background: rgba(255,255,255,0.04); }
.btn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-btn.quiet    .btn-dot { background: var(--green); }
.status-btn.moderate .btn-dot { background: var(--yellow); }
.status-btn.busy     .btn-dot { background: var(--red); }
.btn-content { display: flex; flex-direction: column; gap: 2px; }
.btn-desc { font-size: 11px; color: var(--gray); font-weight: 400; letter-spacing: 0; font-family: 'Inter', sans-serif; text-transform: none; }
.updated-at { font-size: 11px; color: var(--gray); text-align: center; opacity: 0.6; }

/* ── OFFERS LIST ── */
.offer-item { background: var(--surface2); border: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.offer-item-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.offer-item-title { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 13px; }
.offer-item-meta { font-size: 12px; color: var(--gray); }
.offer-item-actions { display: flex; gap: 8px; flex-shrink: 0; }
.offers-list { display: flex; flex-direction: column; gap: 10px; }
.offers-empty-msg { text-align: center; color: var(--gray); padding: 32px; font-size: 13px; border: 1px dashed var(--border); }

/* ── MODAL ── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center; padding: 16px; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); width: 100%; max-width: 520px; max-height: 90svh; overflow-y: auto; padding: 28px 24px; display: flex; flex-direction: column; gap: 16px; }
.modal-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 16px; letter-spacing: 1px; }
.modal-close { background: transparent; border: none; color: var(--gray); font-size: 22px; cursor: pointer; line-height: 1; }
.modal-header { display: flex; align-items: center; justify-content: space-between; }

/* ── LOGOUT ── */
.btn-logout { background: transparent; border: 1px solid var(--border); color: var(--gray); padding: 10px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-family: 'Montserrat', sans-serif; cursor: pointer; transition: all 0.3s; width: 100%; }
.btn-logout:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>
<div class="wrap">

  <!-- LOGO -->
  <div class="logo">
    <img src="assets/gymz-logo.png" alt="GYMZ" />
    <div class="logo-text">GYMZ <span>Admin Panel</span></div>
  </div>

  <!-- LOGIN -->
  <div class="card" id="loginScreen">
    <div style="font-family:'Montserrat',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;color:var(--gray)">ENTER PASSWORD</div>
    <input type="password" id="passwordInput" placeholder="Admin password..." autocomplete="current-password" />
    <button class="btn-primary" onclick="tryLogin()">Login</button>
    <p class="error-msg" id="errorMsg">Wrong password. Try again.</p>
  </div>

  <!-- APP -->
  <div id="appScreen">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('status', this)">🟢 Status</button>
      <button class="tab-btn" onclick="switchTab('offers', this)">🏷 Offers</button>
    </div>

    <!-- ── STATUS TAB ── -->
    <div class="tab-panel active" id="tab-status">
      <div class="card" style="gap:12px">
        <div class="status-current">
          <div class="status-dot loading" id="currentDot"></div>
          <div>
            <div class="current-label">Current Status</div>
            <div class="current-value" id="currentValue">Loading...</div>
          </div>
        </div>
        <div class="status-btns">
          <button class="status-btn quiet" onclick="setStatus('quiet')">
            <div class="btn-dot"></div>
            <div class="btn-content"><span>Quiet — رايق</span><span class="btn-desc">Few members, easy to train</span></div>
          </button>
          <button class="status-btn moderate" onclick="setStatus('moderate')">
            <div class="btn-dot"></div>
            <div class="btn-content"><span>Moderate — متوسط</span><span class="btn-desc">Normal crowd, equipment available</span></div>
          </button>
          <button class="status-btn busy" onclick="setStatus('busy')">
            <div class="btn-dot"></div>
            <div class="btn-content"><span>Busy — مزدحم</span><span class="btn-desc">Peak hours, may need to wait</span></div>
          </button>
        </div>
        <div class="feedback" id="statusFeedback"></div>
        <div class="updated-at" id="updatedAt"></div>
      </div>
    </div>

    <!-- ── OFFERS TAB ── -->
    <div class="tab-panel" id="tab-offers">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="section-title-sm">All Offers</div>
          <button class="btn-secondary" onclick="openModal()">+ Add Offer</button>
        </div>
        <div class="offers-list" id="offersList">
          <div class="offers-empty-msg">Loading offers...</div>
        </div>
        <div class="feedback" id="offersFeedback"></div>
      </div>
    </div>

    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- ── ADD/EDIT MODAL ── -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Offer</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="section-title-sm">English</div>
    <div class="field"><label>Badge EN (optional)</label><input type="text" id="f_badgeEn" placeholder="e.g. New Member" /></div>
    <div class="field"><label>Title EN *</label><input type="text" id="f_titleEn" placeholder="e.g. First Month 20% Off" /></div>
    <div class="field"><label>Description EN *</label><textarea id="f_descEn" placeholder="Offer description in English..."></textarea></div>

    <div class="section-title-sm">عربي</div>
    <div class="field"><label>Badge AR (اختياري)</label><input type="text" id="f_badgeAr" placeholder="مثال: عضو جديد" /></div>
    <div class="field"><label>العنوان AR *</label><input type="text" id="f_titleAr" placeholder="مثال: خصم 20% على أول شهر" /></div>
    <div class="field"><label>الوصف AR *</label><textarea id="f_descAr" placeholder="وصف العرض بالعربي..."></textarea></div>

    <div class="section-title-sm">Pricing</div>
    <div class="field-row">
      <div class="field"><label>Old Price (optional)</label><input type="text" id="f_oldPrice" placeholder="e.g. 600" /></div>
      <div class="field"><label>New Price *</label><input type="text" id="f_newPrice" placeholder="e.g. 480 or Free" /></div>
    </div>
    <div class="field"><label>Order (for sorting)</label><input type="number" id="f_order" placeholder="1, 2, 3..." value="1" /></div>

    <div class="feedback" id="modalFeedback"></div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal()" style="flex:1">Cancel</button>
      <button class="btn-primary" onclick="saveOffer()" style="flex:2" id="saveBtn">Save Offer</button>
    </div>
  </div>
</div>

<script>
window.tryLogin = function() {
  const pass = document.getElementById('passwordInput').value;
  if (pass === ADMIN_PASSWORD) {
    sessionStorage.setItem('gymzAdmin', '1');
    window.__doShowApp && window.__doShowApp();
  } else {
    const err = document.getElementById('errorMsg');
    err.style.display = 'block';
    document.getElementById('passwordInput').value = '';
    setTimeout(() => err.style.display = 'none', 3000);
  }
};
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('passwordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') window.tryLogin();
  });
});
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, addDoc, updateDoc, deleteDoc,
  collection, onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const ADMIN_PASSWORD = "gymz2025";

const firebaseConfig = {
  apiKey: "AIzaSyAr3JBPFwiPqLErSx1czj1HJMrdP1pvQm8",
  authDomain: "gymz-a2a92.firebaseapp.com",
  projectId: "gymz-a2a92",
  storageBucket: "gymz-a2a92.firebasestorage.app",
  messagingSenderId: "948027314768",
  appId: "1:948027314768:web:d424fbb4c7a7a28487b755"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const statusRef   = doc(db, 'gymStatus', 'current');
const offersCol   = collection(db, 'offers');

const statusLabels = { quiet: 'Quiet — رايق', moderate: 'Moderate — متوسط', busy: 'Busy — مزدحم' };

let editingId = null;
let offersCache = [];

// ── HELPERS ──
function showFeedback(id, type, msg, ms = 3000) {
  const el = document.getElementById(id);
  el.className = 'feedback ' + type;
  el.textContent = (type === 'success' ? '✓ ' : '✗ ') + msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', ms);
}

// ── LOGIN ──
// login handled by plain script above
window.logout = function() {
  sessionStorage.removeItem('gymzAdmin');
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('passwordInput').value = '';
};

window.__doShowApp = function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
  startStatusListener();
  startOffersListener();
}

// ── TABS ──
window.switchTab = function(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
};

// ── STATUS ──
function startStatusListener() {
  onSnapshot(statusRef, snap => {
    const dot = document.getElementById('currentDot');
    const val = document.getElementById('currentValue');
    const upd = document.getElementById('updatedAt');
    if (snap.exists()) {
      const { status, updatedAt } = snap.data();
      dot.className = 'status-dot ' + (status || 'loading');
      val.textContent = statusLabels[status] || status;
      document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active-btn'));
      const ab = document.querySelector('.status-btn.' + status);
      if (ab) ab.classList.add('active-btn');
      if (updatedAt?.toDate) {
        const d = updatedAt.toDate();
        upd.textContent = 'Last updated: ' + d.toLocaleTimeString('en-EG', { hour: '2-digit', minute: '2-digit' });
      }
    }
  });
}

window.setStatus = async function(status) {
  try {
    await setDoc(statusRef, { status, updatedAt: serverTimestamp() });
    showFeedback('statusFeedback', 'success', 'Status updated to ' + statusLabels[status]);
  } catch(e) {
    showFeedback('statusFeedback', 'error', e.message, 5000);
  }
};

// ── OFFERS LIST ──
function startOffersListener() {
  const q = query(offersCol, orderBy('order', 'asc'));
  onSnapshot(q, snap => {
    offersCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderOffersList();
  }, err => {
    document.getElementById('offersList').innerHTML =
      '<div class="offers-empty-msg">Error loading offers: ' + err.message + '</div>';
  });
}

function renderOffersList() {
  const list = document.getElementById('offersList');
  if (!offersCache.length) {
    list.innerHTML = '<div class="offers-empty-msg">No offers yet. Click "+ Add Offer" to create one.</div>';
    return;
  }
  list.innerHTML = offersCache.map(o => `
    <div class="offer-item">
      <div class="offer-item-header">
        <div>
          <div class="offer-item-title">${o.titleEn || '—'}</div>
          <div class="offer-item-meta">${o.titleAr || '—'} ${o.newPrice ? '• ' + o.newPrice + ' EGP' : ''}</div>
        </div>
        <div class="offer-item-actions">
          <button class="btn-secondary" onclick="editOffer('${o.id}')">Edit</button>
          <button class="btn-danger" onclick="deleteOffer('${o.id}')">Delete</button>
        </div>
      </div>
    </div>`).join('');
}

// ── MODAL ──
window.openModal = function(id = null) {
  editingId = id;
  const modal = document.getElementById('modalBg');
  const title = document.getElementById('modalTitle');

  if (id) {
    const o = offersCache.find(x => x.id === id);
    if (!o) return;
    title.textContent = 'Edit Offer';
    document.getElementById('f_badgeEn').value  = o.badgeEn  || '';
    document.getElementById('f_titleEn').value  = o.titleEn  || '';
    document.getElementById('f_descEn').value   = o.descEn   || '';
    document.getElementById('f_badgeAr').value  = o.badgeAr  || '';
    document.getElementById('f_titleAr').value  = o.titleAr  || '';
    document.getElementById('f_descAr').value   = o.descAr   || '';
    document.getElementById('f_oldPrice').value = o.oldPrice || '';
    document.getElementById('f_newPrice').value = o.newPrice || '';
    document.getElementById('f_order').value    = o.order    ?? 1;
  } else {
    title.textContent = 'Add Offer';
    ['f_badgeEn','f_titleEn','f_descEn','f_badgeAr','f_titleAr','f_descAr','f_oldPrice','f_newPrice'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f_order').value = offersCache.length + 1;
  }
  modal.classList.add('open');
};

window.closeModal = function() {
  document.getElementById('modalBg').classList.remove('open');
  editingId = null;
};

window.editOffer = function(id) { openModal(id); };

window.saveOffer = async function() {
  const titleEn = document.getElementById('f_titleEn').value.trim();
  const titleAr = document.getElementById('f_titleAr').value.trim();
  const descEn  = document.getElementById('f_descEn').value.trim();
  const descAr  = document.getElementById('f_descAr').value.trim();
  const newPrice = document.getElementById('f_newPrice').value.trim();

  if (!titleEn || !titleAr || !descEn || !descAr || !newPrice) {
    showFeedback('modalFeedback', 'error', 'Please fill all required fields (*)', 4000);
    return;
  }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving...';

  const data = {
    badgeEn:  document.getElementById('f_badgeEn').value.trim(),
    titleEn,  descEn,
    badgeAr:  document.getElementById('f_badgeAr').value.trim(),
    titleAr,  descAr,
    oldPrice: document.getElementById('f_oldPrice').value.trim(),
    newPrice,
    order: parseInt(document.getElementById('f_order').value) || 1,
    updatedAt: serverTimestamp()
  };

  try {
    if (editingId) {
      await updateDoc(doc(db, 'offers', editingId), data);
      showFeedback('offersFeedback', 'success', 'Offer updated successfully');
    } else {
      await addDoc(offersCol, data);
      showFeedback('offersFeedback', 'success', 'Offer added successfully');
    }
    closeModal();
  } catch(e) {
    showFeedback('modalFeedback', 'error', e.message, 5000);
  }
  saveBtn.disabled = false;
  saveBtn.textContent = 'Save Offer';
};

window.deleteOffer = async function(id) {
  if (!confirm('Delete this offer? This cannot be undone.')) return;
  try {
    await deleteDoc(doc(db, 'offers', id));
    showFeedback('offersFeedback', 'success', 'Offer deleted');
  } catch(e) {
    showFeedback('offersFeedback', 'error', e.message, 5000);
  }
};

// close modal on bg click
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeModal();
});

// auto login
if (sessionStorage.getItem('gymzAdmin')) window.__doShowApp();
</script>
</body>
</html>
